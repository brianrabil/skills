packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# next pins postcss 8.4.31, which is vulnerable to GHSA XSS via unescaped
# </style> in stringify output (Dependabot alert #1); patched in 8.5.10
overrides:
  "postcss@<8.5.10": 8.5.16

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@rolldown/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - experimental-ai-sdk-code-mode
  - eve
  - nitro
  - rolldown
  - workflow
